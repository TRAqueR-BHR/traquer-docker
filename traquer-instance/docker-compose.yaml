  traquer-postgresql-16-server:
    image: postgres:16.1
    container_name: traquer-postgresql-16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_DEV_DB_USER}
      POSTGRES_PASSWORD: ${POSTGRES_DEV_DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DEV_DB_NAME}
    volumes:
      - ${POSTGRES_DATA_DIR}/postgresql-data-16:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_DEV_DB_PORT}:5432"
    networks:
      - julia-middleware

  # traquer-pgbouncer:
  #   image: edoburu/pgbouncer:1.15.0
  #   environment:
  #     - DB_HOST=${DB_HOST}
